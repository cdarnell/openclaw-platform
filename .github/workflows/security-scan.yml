name: Security Scan

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run trivy fs scan
        uses: aquasecurity/trivy-action@v0.18.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH

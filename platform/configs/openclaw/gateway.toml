[network]
listen_addr = "10.31.0.5:3000"
cert_path   = "/certs/gateway-fullchain.pem"
key_path    = "/certs/gateway.key"
ca_path     = "/certs/gentoofoo-chain.pem"

[vault]
addr      = "https://vault.openclaw.internal:8200"
role_id   = "${OPENCLAW_VAULT_ROLE_ID}"
secret_id = "${OPENCLAW_VAULT_SECRET_ID}"

[planner]
endpoint = "https://planner.openclaw.internal:3101"

[executor]
endpoint = "https://executor.openclaw.internal:3102"

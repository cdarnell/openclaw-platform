[Interface]
Address = 10.31.0.1/24
ListenPort = 51820
PrivateKey = <server-private-key>
# Allow OCI host to reach on-prem networks through tunnel
PostUp   = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
SaveConfig = true

# Example peer: Ollama host
[Peer]
PublicKey = <ollama-public-key>
AllowedIPs = 10.31.0.10/32,192.168.50.0/24
PersistentKeepalive = 25

# Example peer: Operator laptop
[Peer]
PublicKey = <operator-public-key>
AllowedIPs = 10.31.0.101/32
PersistentKeepalive = 25
